version: '3.6'

services: 
  backend:
    image: fabreguesm/flexxus-order-backend:latest
    hostname: flxorder-flexxus-com-ar
    ports: 
      - "7000:5000"
    networks:
      - traefik
    deploy:      
      placement:
        constraints: ["${NODE}"]
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_TYPE=MariaDB
      - PREWARM_LICENSE=false
      - PREWARM_CONNECTORS=false
    restart: unless-stopped
    volumes:
      - 'node_data:/app/data/'
      - 'factura_data:/app/factura_electronica/'
      - 'pdf_data:/app/public/pdf/' 
    logging:
      driver: loki
      options:
        loki-url: ${LOKI_URL}  

  frontend:
    image: fabreguesm/flexxus-order-frontend:latest
    ports: 
      - "7001:80"
    networks:
      - traefik
    deploy:      
      placement:
        constraints: ["${NODE}"]      
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.${SERVICE_NAME}.entrypoints=web"
        - "traefik.http.routers.${SERVICE_NAME}.rule=Host(`${DOMAIN_NAME}`)"
        - "traefik.http.middlewares.${SERVICE_NAME}-http.redirectscheme.scheme=https"
        - "traefik.http.routers.${SERVICE_NAME}-https.rule=Host(`${DOMAIN_NAME}`)"
        - "traefik.http.routers.${SERVICE_NAME}-https.entrypoints=https"
        - "traefik.http.routers.${SERVICE_NAME}-https.tls=true"
        - "traefik.http.routers.${SERVICE_NAME}-https.tls.certresolver=myresolver"
        - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=80"     
    environment:
      - VITE_GATEWAY_SECRET_KEY=p@55w0rdu1tr@s3cr3t0
    restart: unless-stopped 
    logging:
      driver: loki
      options:
        loki-url: ${LOKI_URL}  

  storybook:
    image: fabreguesm/flexxus-order-storybook:latest
    ports:
      - "7002:80"
    restart: unless-stopped  
    networks:
      - traefik
    deploy:      
      placement:
        constraints: ["${NODE}"]      
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.${SERVICE_NAME}.entrypoints=web"
        - "traefik.http.routers.${SERVICE_NAME}.rule=Host(`${DOMAIN_NAME}`)"
        - "traefik.http.middlewares.${SERVICE_NAME}-http.redirectscheme.scheme=https"
        - "traefik.http.routers.${SERVICE_NAME}-https.rule=Host(`${DOMAIN_NAME}`)"
        - "traefik.http.routers.${SERVICE_NAME}-https.entrypoints=https"
        - "traefik.http.routers.${SERVICE_NAME}-https.tls=true"
        - "traefik.http.routers.${SERVICE_NAME}-https.tls.certresolver=myresolver"
        - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=80"
    logging:
      driver: loki
      options:
        loki-url: ${LOKI_URL}

  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 30
    restart: unless-stopped
    networks:
      - traefik
    deploy:
      placement:
        constraints:
          - node.role == manager
    logging:
      driver: loki
      options:
        loki-url: ${LOKI_URL}


volumes:
  node_data:
    name: "${SERVICE_NAME}_node-data"
  factura_data:
    name: "${SERVICE_NAME}_factura-data"
  pdf_data:
    name: "${SERVICE_NAME}_pdf-data"   

networks:
  traefik:
    external:
      name: traefik-network
